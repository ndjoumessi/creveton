name: Deploy Staging

# Se déclenche UNIQUEMENT après un run CI réussi sur main (CI verte → déploiement).
# workflow_run garantit l'enchaînement « push main → CI → deploy ».
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Un seul déploiement staging à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

defaults:
  run:
    working-directory: backend

jobs:
  deploy:
    name: Deploy to Railway (staging)
    runs-on: ubuntu-latest
    # Garde-fou : ne déployer que si la CI a réussi.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        # RAILWAY_TOKEN : token de projet Railway, à définir dans
        # Settings → Environments → staging → Secrets du dépôt GitHub.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'backend' }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Secret RAILWAY_TOKEN manquant (environnement staging)."
            exit 1
          fi
          railway up --service "$RAILWAY_SERVICE" --ci
