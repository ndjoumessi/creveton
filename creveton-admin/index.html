<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creveton Admin</title>

    <!-- PWA : application installable (coquille hors-ligne, manifeste). -->
    <meta name="application-name" content="Creveton Admin" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Creveton" />
    <meta name="theme-color" content="#0b2e1a" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/icon-512.png" color="#0b2e1a" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Anti-flash : applique le thème AVANT le rendu React. Lit la préférence
      // persistée (zustand : { state: { isDark } }) sinon suit le système.
      (function () {
        try {
          var dark;
          var raw = localStorage.getItem('creveton_admin_theme');
          if (raw) { dark = !!(JSON.parse(raw).state || {}).isDark; }
          else { dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
          var root = document.documentElement;
          root.setAttribute('data-theme', dark ? 'dark' : 'light');
          if (dark) root.classList.add('dark');
        } catch (e) { /* défaut : clair */ }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
